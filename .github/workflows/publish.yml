name: Node.js Package CI/CD

# 只有推送以 v 开头的 Tag 时才触发（如 v1.0.8）
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 第1步：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 第2步：安装 Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      # 第3步：安装依赖
      - name: Install dependencies
        run: npm install

      # 第4步：运行测试
      - name: Run tests
        run: npm run test || echo "测试未通过或没有测试，跳过并继续发布"

      # 第5步：发布到 NPM
      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
